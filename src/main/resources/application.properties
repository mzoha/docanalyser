spring.application.name=docanalyser

# Server
server.port=8080

# H2 Database (in-memory for dev)
spring.datasource.url=jdbc:h2:mem:docdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Directory to store uploaded files (will be created automatically)
app.upload.dir=${user.home}/docanalyzer-uploads

# Thymeleaf
spring.thymeleaf.cache=false
