<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Documents - AI Document Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Uploaded Documents</h1>

    <table class="table table-striped mt-4">
        <thead>
        <tr>
            <th>ID</th>
            <th>Filename</th>
            <th>Status</th>
            <th>Upload Time</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="/">AI Document Analyzer</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" href="/">Upload</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/documents">Documents</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/compare">Compare</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <tr th:each="doc : ${documents}">
            <td th:text="${doc.id}">1</td>
            <td th:text="${doc.filename}">file.pdf</td>
            <td th:text="${doc.status}">UPLOADED</td>
            <td th:text="${doc.uploadTime}">2026-02-25</td>
            <td>
                <a th:href="@{/documents/{id}(id=${doc.id})}" class="btn btn-sm btn-primary">View</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-primary">Upload New Document</a>
</div>
</body>
</html>
