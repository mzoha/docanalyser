<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Documents - AI Document Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Uploaded Documents</h1>

    <table class="table table-striped mt-4">
        <thead>
        <tr>
            <th>ID</th>
            <th>Filename</th>
            <th>Status</th>
            <th>Upload Time</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="doc : ${documents}">
            <td th:text="${doc.id}">1</td>
            <td th:text="${doc.filename}">file.pdf</td>
            <td th:text="${doc.status}">UPLOADED</td>
            <td th:text="${doc.uploadTime}">2026-02-25</td>
            <td>
                <a th:href="@{/documents/{id}(id=${doc.id})}" class="btn btn-sm btn-primary">View</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-primary">Upload New Document</a>
</div>
</body>
</html>
