<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upload PDF - AI Document Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">AI Document Analyzer</h1>
    <p>Upload a PDF document to get started.</p>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>

    <form method="post" action="/upload" enctype="multipart/form-data" class="mt-4">
        <div class="mb-3">
            <label for="file" class="form-label">Choose PDF file</label>
            <input class="form-control" type="file" name="file" id="file" accept=".pdf,application/pdf" required>
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
    </form>

    <div class="mt-4">
        <a href="/documents" class="btn btn-outline-secondary">View Uploaded Documents</a>
    </div>
</div>
</body>
</html>
