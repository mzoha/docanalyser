<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Document Detail - AI Document Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-tabs .nav-link {
            color: #495057;
        }
        .nav-tabs .nav-link.active {
            font-weight: bold;
            color: #0d6efd;
        }
        .analysis-content {
            max-height: 500px;
            overflow-y: auto;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }
        .btn-analysis {
            margin: 2px;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">AI Document Analyzer</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Upload</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/documents">Documents</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/compare">Compare</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <h1>Document Details</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card mt-4">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0" th:text="${document.filename}">Filename</h3>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <p><strong>Status:</strong>
                        <span th:text="${document.status}"
                              th:classappend="${document.status == 'COMPLETED'} ? 'badge bg-success' :
                                                 (${document.status == 'FAILED'} ? 'badge bg-danger' : 'badge bg-warning')">
                            </span>
                    </p>
                    <p><strong>Uploaded:</strong> <span th:text="${#temporals.format(document.uploadTime, 'yyyy-MM-dd HH:mm')}"></span></p>
                </div>
                <div class="col-md-6 text-end">
                    <a href="/documents" class="btn btn-outline-secondary">← Back to Documents</a>
                </div>
            </div>

            <!-- Analysis Buttons - All Types -->
            <div class="mt-4">
                <h5>Run Analysis:</h5>
                <div class="btn-group flex-wrap" role="group">
                    <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="type" value="SUMMARY">
                        <button type="submit" class="btn btn-outline-primary btn-analysis">📝 Summary</button>
                    </form>

                    <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="type" value="KEY_POINTS">
                        <button type="submit" class="btn btn-outline-secondary btn-analysis">🔑 Key Points</button>
                    </form>

                    <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="type" value="ENTITIES">
                        <button type="submit" class="btn btn-outline-info btn-analysis">👥 Entities</button>
                    </form>

                    <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="type" value="DETAILED_ANALYSIS">
                        <button type="submit" class="btn btn-outline-success btn-analysis">📊 Detailed</button>
                    </form>

                    <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="type" value="TOPICS">
                        <button type="submit" class="btn btn-outline-warning btn-analysis">🏷️ Topics</button>
                    </form>

                    <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="type" value="SENTIMENT">
                        <button type="submit" class="btn btn-outline-danger btn-analysis">😊 Sentiment</button>
                    </form>

                    <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="type" value="QUESTIONS">
                        <button type="submit" class="btn btn-outline-dark btn-analysis">❓ Questions</button>
                    </form>

                    <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline;">
                        <input type="hidden" name="type" value="TARGET_AUDIENCE">
                        <button type="submit" class="btn btn-outline-primary btn-analysis">🎯 Audience</button>
                    </form>
                </div>
            </div>

            <!-- Tabbed Interface for Results -->
            <div th:if="${not #lists.isEmpty(analyses)}" class="mt-5">
                <h4>Analysis Results</h4>

                <ul class="nav nav-tabs" id="analysisTabs" role="tablist">
                    <li class="nav-item" role="presentation"
                        th:each="analysis, iter : ${analyses}">
                        <button class="nav-link"
                                th:classappend="${iter.first ? 'active' : ''}"
                                th:id="'tab-' + ${analysis.analysisType}"
                                data-bs-toggle="tab"
                                th:attr="data-bs-target='#content-' + ${analysis.analysisType}"
                                type="button"
                                role="tab"
                                th:text="${analysis.analysisType}">
                            Analysis Type
                        </button>
                    </li>
                </ul>

                <div class="tab-content mt-3">
                    <div class="tab-pane fade"
                         th:classappend="${iter.first ? 'show active' : ''}"
                         th:id="'content-' + ${analysis.analysisType}"
                         role="tabpanel"
                         th:each="analysis, iter : ${analyses}">
                        <div class="analysis-content" th:text="${analysis.result}"></div>
                        <small class="text-muted mt-2 d-block"
                               th:text="'Generated: ' + ${#temporals.format(analysis.createdAt, 'yyyy-MM-dd HH:mm')}">
                        </small>
                    </div>
                </div>
            </div>

            <!-- Extracted Text Section -->
            <div class="mt-5">
                <h4>Extracted Text</h4>
                <div class="border p-3 bg-light" style="max-height: 400px; overflow-y: auto;">
                        <pre class="mb-0" style="white-space: pre-wrap; font-family: inherit;"
                             th:text="${document.extractedText}">Extracted text here</pre>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
