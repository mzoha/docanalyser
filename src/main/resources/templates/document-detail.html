<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Document Detail - AI Document Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Document Details</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card mt-4">
        <div class="card-header">
            <h3 th:text="${document.filename}">Filename</h3>
        </div>
        <div class="card-body">
            <p><strong>Status:</strong>
                <span th:text="${document.status}"
                      th:classappend="${document.status == 'COMPLETED'} ? 'text-success' :
                         (${document.status == 'FAILED'} ? 'text-danger' : 'text-warning')">
    </span>
            </p>
            <p><strong>Uploaded:</strong> <span th:text="${document.uploadTime}"></span></p>

            <!-- Analysis Buttons -->
            <div class="btn-group mb-3">
                <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline;">
                    <input type="hidden" name="type" value="SUMMARY">
                    <button type="submit" class="btn btn-primary">Summarize</button>
                </form>

                <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline; margin-left: 5px;">
                    <input type="hidden" name="type" value="KEY_POINTS">
                    <button type="submit" class="btn btn-secondary">Key Points</button>
                </form>

                <form th:action="@{/analysis/{id}(id=${document.id})}" method="post" style="display: inline; margin-left: 5px;">
                    <input type="hidden" name="type" value="ENTITIES">
                    <button type="submit" class="btn btn-info">Extract Entities</button>
                </form>
            </div>

            <!-- Analysis Results Section -->
            <div th:if="${not #lists.isEmpty(analyses)}" class="mt-4">
                <h4>Analysis Results</h4>

                <div th:each="analysis : ${analyses}" class="card mt-3">
                    <div class="card-header" th:text="${analysis.analysisType}">Analysis Type</div>
                    <div class="card-body">
                        <p class="card-text" style="white-space: pre-wrap;" th:text="${analysis.result}">Analysis result here</p>
                        <small class="text-muted" th:text="${analysis.createdAt}">Date</small>
                    </div>
                </div>
            </div>

            <!-- Extracted Text -->
            <h4 class="mt-4">Extracted Text</h4>
            <div class="border p-3" style="max-height: 300px; overflow-y: auto;">
                <pre th:text="${document.extractedText}">Extracted text here</pre>
            </div>
        </div>
    </div>

    <a href="/documents" class="btn btn-link mt-3">Back to Documents</a>
</div>
</body>
</html>
